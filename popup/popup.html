<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Shorts Auto Scroller</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Shorts Controller</h1>

    <!-- Voice Control Section -->
    <div class="section">
      <div class="section-header">Voice Control</div>
      <div class="control-group">
        <label class="toggle-label">
          <input type="checkbox" id="voiceEnabled">
          <span>Enable Voice</span>
          <span class="voice-status" id="voiceStatus"></span>
        </label>
        <p class="voice-hint">Clap or snap to skip to next Short</p>
        <p class="voice-hint">Instant detection - works while gaming</p>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Auto Scroll Section -->
    <div class="section">
      <div class="section-header">Auto Scroll</div>
      <div class="status-section">
        <div class="status-indicator" id="statusIndicator">
          <span class="status-dot"></span>
          <span class="status-text" id="statusText">Off</span>
        </div>
      </div>

      <div class="control-group">
        <label for="interval">Interval (seconds)</label>
        <div class="slider-row">
          <input type="range" id="interval" min="3" max="60" value="10" step="1">
          <span class="slider-value" id="intervalValue">10s</span>
        </div>
      </div>

      <div class="control-group">
        <label>
          <input type="checkbox" id="watchFull" checked>
          Wait for video to finish
        </label>
      </div>

      <div class="control-group">
        <label>
          <input type="checkbox" id="randomize">
          Randomize interval (±30%)
        </label>
      </div>

      <div class="button-row">
        <button id="toggleBtn" class="btn btn-primary">Start Auto</button>
        <button id="skipBtn" class="btn btn-secondary">Skip</button>
      </div>
    </div>

    <p class="hint">Navigate to <strong>youtube.com/shorts</strong> to use.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
