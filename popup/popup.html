<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Shorts Auto Scroller</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Shorts Auto Scroller</h1>

    <div class="status-section">
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot"></span>
        <span class="status-text" id="statusText">Inactive</span>
      </div>
    </div>

    <div class="control-group">
      <label for="interval">Scroll Interval (seconds)</label>
      <div class="slider-row">
        <input type="range" id="interval" min="3" max="60" value="10" step="1">
        <span class="slider-value" id="intervalValue">10s</span>
      </div>
    </div>

    <div class="control-group">
      <label>
        <input type="checkbox" id="watchFull" checked>
        Wait for video to finish before scrolling
      </label>
    </div>

    <div class="control-group">
      <label>
        <input type="checkbox" id="randomize">
        Randomize interval (±30%)
      </label>
    </div>

    <div class="divider"></div>

    <div class="control-group voice-section">
      <label>
        <input type="checkbox" id="voiceEnabled">
        Voice Control
      </label>
      <p class="voice-hint">Say: <strong>"next"</strong>, <strong>"skip"</strong>, <strong>"start"</strong>, or <strong>"stop"</strong></p>
    </div>

    <div class="button-row">
      <button id="toggleBtn" class="btn btn-primary">Start</button>
      <button id="skipBtn" class="btn btn-secondary">Skip</button>
    </div>

    <p class="hint">Navigate to <strong>youtube.com/shorts</strong> to use this extension.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
